name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: gofmt
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./...

      - name: Go test
        run: go test ./...

  # Deploy only on push to main, after the build gate passes. Kamal builds the
  # image (Dockerfile rebuilds the SPA + binary), pushes to ghcr and rolls it
  # out over SSH. The VPS is reached through a Cloudflare Tunnel — no inbound
  # ports — per dev-notes/playbook-cicd-kamal-cloudflare-tunnel.
  #
  # Unlike the Rails playbook, this stateless app needs no master.key and no DB
  # secrets, so the deploy job is just: kamal deploy.
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push the image to ghcr
    env:
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Kamal
        run: gem install kamal -v "~> 2.0"

      - uses: docker/setup-buildx-action@v3

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o "$RUNNER_TEMP/cloudflared"
          sudo install -m 0755 "$RUNNER_TEMP/cloudflared" /usr/local/bin/cloudflared

      - name: SSH via Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<'EOF'
          Host <VPS_IP>
            User root
            ProxyCommand cloudflared access ssh --hostname <SSH_HOST>
            StrictHostKeyChecking accept-new
          EOF

      - name: Deploy
        run: kamal deploy
