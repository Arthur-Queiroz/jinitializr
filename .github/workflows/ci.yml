name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: false # zero dependencies -> no go.sum -> nothing to cache

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: gofmt
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./...

      - name: Go test
        run: go test ./...

  # Sanity-check that the image builds before we deploy. The real build happens
  # on the VPS (docker compose up --build); this catches a broken Dockerfile in
  # CI instead of on the server.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate image build (no run)
        run: docker compose build

  # Deploy only on push to main, after the gates pass. No Kamal, no registry:
  # the runner SSHes to the VPS through the Cloudflare Tunnel and runs
  # git reset --hard + docker compose up -d --build (mirrors jpad). The build
  # happens on the VPS; the image is never pushed anywhere.
  #
  # Guard: deploy stays OFF until the infra is ready. Flip it on by setting the
  # repository variable DEPLOY_ENABLED=true (Settings -> Secrets and variables
  # -> Actions -> Variables). Until then this job is skipped, not failed.
  deploy:
    needs: [build, docker]
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o "$RUNNER_TEMP/cloudflared"
          sudo install -m 0755 "$RUNNER_TEMP/cloudflared" /usr/local/bin/cloudflared

      - name: SSH via Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<'EOF'
          Host 2.25.158.85
            User root
            ProxyCommand cloudflared access ssh --hostname ssh.devarthur.com.br
            StrictHostKeyChecking accept-new
          EOF

      - name: Deploy to VPS
        run: |
          ssh root@2.25.158.85 '
            set -e
            if [ ! -d /opt/jinitializr/.git ]; then
              git clone https://github.com/Arthur-Queiroz/jinitializr /opt/jinitializr
            fi
            cd /opt/jinitializr
            git fetch --all
            git reset --hard origin/main
            docker compose up -d --build
            docker compose ps
          '
